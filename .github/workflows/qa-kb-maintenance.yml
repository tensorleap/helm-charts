name: QA KB Maintenance

# Weekly (and on-demand) sync of qa-knowledge/ against the latest masters of the
# Tensorleap source repos. Detects drift, patches only the affected docs, and opens
# a PR for review. See qa-knowledge/maintenance/MAINTENANCE.md.
#
# Required repo secrets:
#   ANTHROPIC_API_KEY      - for the Claude Code CLI (or swap in Bedrock/Vertex env).
#   KB_SOURCE_REPOS_TOKEN  - PAT / fine-grained token with READ access to
#                            tensorleap/engine, tensorleap/node-server, tensorleap/web-ui.
# Until both secrets exist the scheduled run is a no-op failure; nothing else is affected.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Re-verify ALL docs regardless of diff'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: qa-kb-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts (KB lives here)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout engine (latest master)
        uses: actions/checkout@v4
        with:
          repository: tensorleap/engine
          ref: master
          token: ${{ secrets.KB_SOURCE_REPOS_TOKEN }}
          path: _src/engine
          fetch-depth: 0

      - name: Checkout node-server (latest master)
        uses: actions/checkout@v4
        with:
          repository: tensorleap/node-server
          ref: master
          token: ${{ secrets.KB_SOURCE_REPOS_TOKEN }}
          path: _src/node-server
          fetch-depth: 0

      - name: Checkout web-ui (latest master)
        uses: actions/checkout@v4
        with:
          repository: tensorleap/web-ui
          ref: master
          token: ${{ secrets.KB_SOURCE_REPOS_TOKEN }}
          path: _src/web-ui
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run KB maintenance agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KB_FORCE_FULL: ${{ inputs.force_full }}
          KB_SRC_HELM_CHARTS: '.'
          KB_SRC_ENGINE: '_src/engine'
          KB_SRC_NODE_SERVER: '_src/node-server'
          KB_SRC_WEB_UI: '_src/web-ui'
        run: |
          claude -p "$(cat qa-knowledge/maintenance/prompt.md)" \
            --permission-mode acceptEdits \
            --allowedTools "Read,Edit,Write,Grep,Glob,Bash(git*)" \
            --max-turns 120 \
            --output-format text | tee "$RUNNER_TEMP/kb-last-run.log" || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: qa-kb-auto-update
          delete-branch: true
          add-paths: qa-knowledge/**
          commit-message: 'docs(qa-knowledge): sync KB with latest source masters'
          title: 'docs(qa-knowledge): sync KB with latest masters'
          labels: qa-knowledge,automated
          body: |
            Automated QA knowledge-base sync against the latest masters of
            engine / node-server / web-ui / helm-charts.

            The maintenance agent diffed each repo since the recorded baseline
            (`qa-knowledge/maintenance/kb-state.json`), patched only the impacted
            docs, and updated the baseline. **Review the diff** — these are
            documentation changes proposed by an agent.

            See `qa-knowledge/maintenance/GAPS.md` for the run log and any open gaps
            the agent could not auto-resolve.
