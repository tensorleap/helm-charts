apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorleap-web-ui
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: tensorleap-web-ui
  template:
    metadata:
      labels:
        app: tensorleap-web-ui
      annotations:
        ad.datadoghq.com/web-ui.logs: '[{"source": "nodejs", "service": "web-ui"}]'
    spec:
      containers:
        - name: web-ui
          image: {{ .Values.image }}:{{ .Values.image_tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              cpu: "200m"
          env:
            - name: PORT
              value: '8080'
