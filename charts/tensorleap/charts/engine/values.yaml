image_tag: master-2714d9d9
image_name: public.ecr.aws/tensorleap/engine
redis_image: docker.io/library/redis:8.6-alpine
entry_point: generic_processor
metrics_activate_nfs: false
samples_generator_nfs: false
# Blob mode: shared-volume disk-free guard floor.
job_shared_disk_min_free_gb: 2
# Static per-job Redis sizing in blob mode (default; per-job pod_memory_override still wins)
redis_blob_pod_gb: 1
redis_blob_maxmemory_mb: 768
env_name: "on-prem"
dependencies_image_name: public.ecr.aws/tensorleap/pippin
dependencies_image_tag: master-d88fb971
target_repo: tensorleap-registry:5000
generic_calculator_image: "public.ecr.aws/tensorleap/engine-generic"
generic_py_ver: py38 #select from: py38, py39, py310, py311, py312

# Outbound proxy for engine PUSH jobs (the pippin image-dependencies-builder dind).
# Set by the installer from its own HTTP(S)_PROXY/NO_PROXY env; empty = no proxy.
http_proxy: ""
https_proxy: ""
no_proxy: ""

localDataDirectories: []
total_memory_bytes: ""
total_storage_bytes: ""
# auto | flag. The orchestrator subtracts the reserve buffer only from auto-detected totals;
# a user-provided total (install flag / settings override) is used verbatim.
total_memory_source: ""
# off | warn | enforce. warn computes and logs admission decisions without blocking.
orchestrator_memory_admission: "off"
installation_memory_reserve_bytes: ""
streaming_handler_max_replicas: 10
gpu: false
gpuTolerations: []

additional_pvcs: []
