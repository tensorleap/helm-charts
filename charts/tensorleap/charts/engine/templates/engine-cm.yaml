apiVersion: v1
kind: ConfigMap
metadata:
  name: engine-cm
{{- if .Values.global.target_namespace }}
  namespace: {{ .Values.global.target_namespace }}
{{- else if .Values.global.namespacedInstall }}
  namespace: {{ .Release.Namespace }}
{{- end }}
data:
  PY_CONFIG: /app/config/config.yaml
{{ if .Values.global.elasticsearch.url }}
  ELASTIC_HOST: {{ .Values.global.elasticsearch.url }}
{{ else }}
  ELASTIC_HOST: http://tl-elasticsearch-es-master:9200
{{ end }}
  SESSION_BUCKET: session
  RABBIT_HOST: rabbitmq.{{ .Release.Namespace }}.svc
  RABBIT_USER: guest
  RABBIT_PASSWORD: guest
  FEEDBACK_TOPIC: feedback
  SUBSCRIBER_TOPIC: job-control-channel
  STORAGE_PROVIDER: minio
  STORAGE_ENDPOINT: tensorleap-minio.{{ .Release.Namespace }}.svc
  STORAGE_PORT: "9000"
  CONTENT_BASE_URL: /session/
  MOUNTHPATH: /usr/minio/session/
  UI_SETTINGS_SCHEMA: '{"N_DATASET_PROCESSES":{"type":"number","title":"Number of Dataset Processes","min":1,"description":"Number of processes to use for dataset processing (if empty, calculated automatically)"},"N_METRICS_PROCESSES":{"type":"number","title":"Number of Metrics Processes","min":1,"description":"Number of processes to use for metrics processing (if empty, calculated automatically)"},"N_VISUALIZERS_PROCESSES":{"type":"number","title":"Number of Visualizers Processes","min":1,"description":"Number of processes to use for visualizers processing (if empty, calculated automatically)"}}'

  ENGINE_IMAGE: {{ .Values.image_name }}:{{ .Values.image_tag }}
  REDIS_IMAGE: {{ .Values.redis_image }}
  GENERIC_CALCULATOR_IMAGE: "public.ecr.aws/tensorleap/engine-generic"
  GENERIC_CALCULATOR_IMAGE_TAG_BASE: {{ .Values.image_tag }}-{{ .Values.generic_py_ver }}
  GENERIC_CALCULATOR_IMAGE_TAG: {{ .Values.image_tag }}-{{ .Values.generic_py_ver }}
  GENERIC_CALCULATOR_ENTRY_POINT: {{ .Values.entry_point }}
  GENERIC_ACTIVATE_NFS: "{{ .Values.metrics_activate_nfs }}"
  GENERIC_HOST_PATH: {{ .Values.localDataDirectories | join ":" }}
{{- if .Values.total_memory_bytes }}
  TOTAL_INSTALLATION_MEMORY_BYTES: {{ .Values.total_memory_bytes | quote }}
{{- end }}
{{- if .Values.total_memory_source }}
  TOTAL_INSTALLATION_MEMORY_SOURCE: {{ .Values.total_memory_source | quote }}
{{- end }}
  ORCHESTRATOR_MEMORY_ADMISSION: {{ .Values.orchestrator_memory_admission | quote }}
{{- if .Values.installation_memory_reserve_bytes }}
  INSTALLATION_MEMORY_RESERVE_BYTES: {{ .Values.installation_memory_reserve_bytes | quote }}
{{- end }}
{{- if .Values.http_proxy }}
  HTTP_PROXY: {{ .Values.http_proxy | quote }}
  http_proxy: {{ .Values.http_proxy | quote }}
{{- end }}
{{- if .Values.https_proxy }}
  HTTPS_PROXY: {{ .Values.https_proxy | quote }}
  https_proxy: {{ .Values.https_proxy | quote }}
{{- end }}
{{- if .Values.no_proxy }}
  NO_PROXY: {{ .Values.no_proxy | quote }}
  no_proxy: {{ .Values.no_proxy | quote }}
{{- end }}
  # Blob mode: shared-volume disk-free guard floor (the hard ceiling that replaces Redis
  # noeviction OOM). In-code default; set here only to tune.
  JOB_SHARED_DISK_MIN_FREE_GB: "{{ .Values.job_shared_disk_min_free_gb }}"
  # Static per-job Redis sizing in blob mode (cluster default; a per-job pod_memory_override
  # written via node-server's engine-redis-settings still takes precedence).
  REDIS_BLOB_POD_GB: "{{ .Values.redis_blob_pod_gb }}"
  REDIS_BLOB_MAXMEMORY_MB: "{{ .Values.redis_blob_maxmemory_mb }}"


