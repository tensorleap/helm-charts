apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-orchestrator
  labels:
    tags.datadoghq.com/env: {{ .Values.env_name }}
    tags.datadoghq.com/service: {{ .Release.Name }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "3"
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: engine
  template:
    metadata:
      annotations:
        # Roll the pod when engine-cm changes — env vars are only read at pod start.
        checksum/env-configmap: {{ include (print $.Template.BasePath "/engine-cm.yaml") . | sha256sum }}
        ad.datadoghq.com/orchestrator.logs: '[{"source": "python", "service": "orchestrator"}]'
      labels:
        app: engine
        tags.datadoghq.com/env: {{ .Values.env_name }}
        tags.datadoghq.com/service: {{ .Release.Name }}
    spec:
      serviceAccountName: deployment-manager
      containers:
        - image: {{ .Values.image_name }}:{{ .Values.image_tag }}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: 500Mi
            limits:
              memory: 500Mi
          command: ["python", "-m", "src_tensorleap.engine.engine_scheduler"]
          name: orchestrator
          env:
            - name: HMAC_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootUser
            - name: HMAC_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootPassword
          envFrom:
            - configMapRef:
                name: engine-cm
          # Redis->storage migration: mount the per-job shared-volume base so the
          # orchestrator can prune dirs leaked by hard-killed jobs (k3d single-node hostPath).
          volumeMounts:
            - name: job-shared
              mountPath: /job-shared
      volumes:
        - name: job-shared
          hostPath:
            path: /var/lib/tensorleap/standalone/storage/job-shared
            type: DirectoryOrCreate
