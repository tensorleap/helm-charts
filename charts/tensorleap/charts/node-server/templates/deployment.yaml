apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorleap-node-server
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: tensorleap-node-server
  template:
    metadata:
      labels:
        app: tensorleap-node-server
      annotations:
        # Roll the pods when the env configmap changes — env vars are only
        # read at pod start.
        checksum/env-configmap: {{ include (print $.Template.BasePath "/node-server-env-configmap.yaml") . | sha256sum }}
        ad.datadoghq.com/tensorleap-node-server.logs: '[{"source": "nodejs", "service": "node-server"}]'
        ad.datadoghq.com/db-migration.logs: '[{"source": "mongodb", "service": "node-server-db-migration"}]'
    spec:
      serviceAccountName: node-server-sa
      initContainers:
        - name: db-migration-files
          image: {{ .Values.image }}:{{ .Values.image_tag }}
          command:
            [
              "sh",
              "-c",
              "mkdir -p /mnt/shared/migrations && cp -r migrations/* /mnt/shared/migrations && mkdir -p /mnt/shared/node_modules && cp -r node_modules/* /mnt/shared/node_modules",
            ]
          volumeMounts:
            - mountPath: /mnt/shared
              name: shared
        - name: db-migration
          securityContext:
            runAsUser: 0
          image: {{ .Values.mongodb_image }}
          command:
            - bash
            - "-c"
            - |
              {{- include "node-server.dbMigrationScript" . | nindent 14 }}
          volumeMounts:
            - mountPath: /mnt/shared
              name: shared
          envFrom:
            - configMapRef:
                name: tensorleap-node-server-env-configmap
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HMAC_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootUser
            - name: HMAC_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootPassword
      containers:
        - name: tensorleap-node-server
          image: {{ .Values.image }}:{{ .Values.image_tag }}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
          ports:
            - name: http
              containerPort: 4000
          readinessProbe:
            failureThreshold: 6
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
            httpGet:
              path: /api/v2/monitor/healthCheck
              port: http
          livenessProbe:
            failureThreshold: 4
            initialDelaySeconds: 5
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 10
            httpGet:
              path: /api/v2/monitor/healthCheck
              port: http
          envFrom:
            - configMapRef:
                name: tensorleap-node-server-env-configmap
          volumeMounts:
            - name: minio
              mountPath: /usr/minio
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HMAC_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootUser
            - name: HMAC_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootPassword
      volumes:
        - name: minio
          persistentVolumeClaim:
            claimName: tensorleap-minio
        - name: shared
          emptyDir: {}
