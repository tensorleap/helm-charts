apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorleap-node-server
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: tensorleap-node-server
  template:
    metadata:
      labels:
        app: tensorleap-node-server
      annotations:
        ad.datadoghq.com/tensorleap-node-server.logs: '[{"source": "nodejs", "service": "node-server"}]'
        ad.datadoghq.com/db-migration.logs: '[{"source": "mongodb", "service": "node-server-db-migration"}]'
        ad.datadoghq.com/migrate-sessions-to-versions.logs: '[{"source": "nodejs", "service": "node-server-migrate-sessions"}]'
    spec:
      serviceAccountName: node-server-sa
      initContainers:
        - name: db-migration-files
          image: {{ .Values.image }}:{{ .Values.image_tag }}
          command:
            [
              "sh",
              "-c",
              "mkdir -p /mnt/shared/migrations && cp -r migrations/* /mnt/shared/migrations && mkdir -p /mnt/shared/node_modules && cp -r node_modules/* /mnt/shared/node_modules",
            ]
          volumeMounts:
            - mountPath: /mnt/shared
              name: shared
        # Phase 1: regular .js migrations up to (and including) the
        # special-migration boundary. Anything past the boundary is
        # deferred to db-migration-post which runs after the special
        # sessions-to-versions migration.
        - name: db-migration-pre
          securityContext:
            runAsUser: 0
          image: {{ .Values.mongodb_image }}
          command:
            - bash
            - "-c"
            - |
              {{- include "node-server.dbMigrationScript" . | nindent 14 }}
          volumeMounts:
            - mountPath: /mnt/shared
              name: shared
          envFrom:
            - configMapRef:
                name: tensorleap-node-server-env-configmap
          env:
            # Phase 1: up to and including the special-migration boundary.
            # Migrations strictly after this index assume sessions-to-versions
            # has already (a) populated `inferenceArtifactId` on versions
            # and (b) finished the storage-tasks K8s Job that moves files
            # to the new `inference/<id>/` / `vis/<id>/` layout.
            #
            # Boundary = 132 (not 134) because migration 133 backfills
            # `graphValidationData.available_latent_spaces` by reading a
            # PCA manifest at the *new* storage path, so it needs both of
            # the above. Running it pre-sessions defaults every version
            # to `[{default, balanced}]` and the script's idempotency
            # guard (`$exists: true`) prevents a corrective re-run.
            # Migration 134 is version/session-independent (only cleans up
            # `under_representation` references in insights/jobs/etc.) so
            # it can safely live in post — keeping it together with 133
            # avoids splitting consecutive numbered files across phases.
            - name: MIGRATION_TO
              value: "{{ .Values.db_migration_special_boundary | default 132 }}"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HMAC_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootUser
            - name: HMAC_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootPassword
        # TODO: Remove this init container once all environments have been migrated
        - name: migrate-sessions-to-versions
          image: {{ .Values.image }}:{{ .Values.image_tag }}
          imagePullPolicy: IfNotPresent
          command: ["npx", "ts-node", "scripts/migrate-sessions-to-versions.ts"]
          envFrom:
            - configMapRef:
                name: tensorleap-node-server-env-configmap
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HMAC_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootUser
            - name: HMAC_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootPassword
          volumeMounts:
            - name: minio
              mountPath: /usr/minio
        # Phase 2: regular .js migrations strictly after the
        # special-migration boundary. Waits for the special migration's
        # background K8s Job to drain `_storage_tasks` before running —
        # post-boundary migrations may depend on the file moves done
        # there.
        - name: db-migration-post
          securityContext:
            runAsUser: 0
          image: {{ .Values.mongodb_image }}
          command:
            - bash
            - "-c"
            - |
              set -euo pipefail

              WAIT_TIMEOUT_SECONDS=${MIGRATION_WAIT_TIMEOUT_SECONDS:-1800}
              echo "Waiting for sessions-to-versions storage tasks to drain (timeout ${WAIT_TIMEOUT_SECONDS}s)..."

              waited=0
              while true; do
                # Treat only `pending` and `in_progress` as truly pending.
                # `failed` and `skipped` are terminal — surface them in the
                # log for visibility but don't block post migrations: a
                # half-broken storage layout is recoverable manually, but
                # an indefinitely-blocked deploy isn't.
                STATUS=$(mongosh $MONGO_URI --eval '
                  const meta = db.getCollection("_migrations").findOne({_id: "sessions-to-versions-v1"});
                  if (!meta || !meta.completedAt) { print("marker-missing"); quit(0); }
                  const names = db.getCollectionNames();
                  if (!names.includes("_storage_tasks")) { print("pending=0 skipped=0 failed=0"); quit(0); }
                  const c = db.getCollection("_storage_tasks");
                  const pending = c.countDocuments({status: {$in: ["pending", "in_progress"]}});
                  const skipped = c.countDocuments({status: "skipped"});
                  const failed = c.countDocuments({status: "failed"});
                  print("pending=" + pending + " skipped=" + skipped + " failed=" + failed);
                ' --quiet | tail -1)

                if [ "$STATUS" = "marker-missing" ]; then
                  echo "WARNING: sessions-to-versions completion marker missing — special migration did not run? Skipping wait and proceeding."
                  break
                fi

                PENDING=$(echo "$STATUS" | sed -n 's/^pending=\([0-9][0-9]*\).*/\1/p')
                SKIPPED=$(echo "$STATUS" | sed -n 's/.*skipped=\([0-9][0-9]*\).*/\1/p')
                FAILED=$(echo "$STATUS" | sed -n 's/.*failed=\([0-9][0-9]*\)$/\1/p')

                if [ "$PENDING" = "0" ]; then
                  if [ "$SKIPPED" != "0" ] || [ "$FAILED" != "0" ]; then
                    echo "WARNING: storage tasks finished with non-completed terminal states: skipped=$SKIPPED failed=$FAILED."
                    echo "         Post-boundary migrations may not find every file at the new layout."
                    echo "To inspect: kubectl exec -it -n $NAMESPACE mongodb-0 -- mongosh tensorleap --eval 'db._storage_tasks.find({status:{\$in:[\"skipped\",\"failed\"]}}, {operation:1, assetType:1, from:1, fallbackFrom:1, error:1}).limit(10).forEach(d=>printjson(d))'"
                  else
                    echo "Storage tasks drained — proceeding."
                  fi
                  break
                fi
                if [ "$waited" -ge "$WAIT_TIMEOUT_SECONDS" ]; then
                  echo "ERROR: timed out after ${WAIT_TIMEOUT_SECONDS}s waiting for $PENDING storage task(s) to drain."
                  echo "To inspect: kubectl logs -n $NAMESPACE job/storage-tasks-migration"
                  exit 1
                fi
                echo "  $PENDING storage task(s) still pending/in_progress (waited ${waited}s)..."
                sleep 15
                waited=$((waited + 15))
              done

              {{- include "node-server.dbMigrationScript" . | nindent 14 }}
          volumeMounts:
            - mountPath: /mnt/shared
              name: shared
          envFrom:
            - configMapRef:
                name: tensorleap-node-server-env-configmap
          env:
            # Phase 2: pick up where pre left off — anything STRICTLY
            # above the boundary the pre pass capped at. Default must match
            # the pre-pass MIGRATION_TO default above (currently 132).
            - name: MIGRATION_FROM
              value: "{{ add (.Values.db_migration_special_boundary | default 132 | int) 1 }}"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HMAC_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootUser
            - name: HMAC_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootPassword
      containers:
        - name: tensorleap-node-server
          image: {{ .Values.image }}:{{ .Values.image_tag }}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
          ports:
            - name: http
              containerPort: 4000
          readinessProbe:
            failureThreshold: 6
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
            httpGet:
              path: /api/v2/monitor/healthCheck
              port: http
          livenessProbe:
            failureThreshold: 4
            initialDelaySeconds: 5
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 10
            httpGet:
              path: /api/v2/monitor/healthCheck
              port: http
          envFrom:
            - configMapRef:
                name: tensorleap-node-server-env-configmap
          volumeMounts:
            - name: minio
              mountPath: /usr/minio
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HMAC_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootUser
            - name: HMAC_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: rootPassword
      volumes:
        - name: minio
          persistentVolumeClaim:
            claimName: tensorleap-minio
        - name: shared
          emptyDir: {}
