apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: docker.io/library/rabbitmq:3.9.22
          imagePullPolicy: IfNotPresent
          resources:
            # A CPU request (no limit) gives rabbitmq guaranteed cgroup shares
            # under node-wide contention without capping it — critical on a
            # single-node dev cluster where a busy `make deploy-local` build
            # can otherwise starve every unreserved pod equally and trip
            # liveness probes that have nothing to do with rabbitmq itself.
            requests:
              cpu: "250m"
              memory: "500Mi"
            limits:
              memory: "500Mi"
          lifecycle:
            preStop:
              exec:
                command:
                  - rabbitmqctl
                  - stop_app
          env:
            - name: RABBITMQ_ERL_COOKIE
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-config
                  key: erlangCookie
            - name: RABBITMQ_DATA_DIR
              value: /var/lib/rabbitmq
            - name: RABBITMQ_MNESIA_BASE
              value: /var/lib/rabbitmq/mnesia
            - name: RABBITMQ_LOG_BASE
              value: /var/log/rabbitmq
          ports:
            - name: amqp
              containerPort: 5672
            - name: http
              containerPort: 15672
          livenessProbe:
            # `rabbitmq-diagnostics status` enumerates full node state (memory,
            # alarms, listeners, etc.) — expensive to schedule and compute, so
            # under CPU contention it's the probe most likely to itself miss
            # its timeout and trigger a spurious kill. `ping` is a minimal
            # Erlang RPC round-trip (same check readiness already uses) that
            # still catches a genuinely dead/wedged broker. failureThreshold
            # and timeoutSeconds are also raised as defense in depth against
            # brief node-wide stalls.
            failureThreshold: 10
            initialDelaySeconds: 120
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 30
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 20
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
          volumeMounts:
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config
            items:
              - key: enabled_plugins
                path: enabled_plugins
              - key: rabbitmq.conf
                path: rabbitmq.conf
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
        labels:
          app: rabbitmq
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 500Mi
{{ if .Values.global.storageClassName }}
        storageClassName: {{ .Values.global.storageClassName }}
{{ end}}
