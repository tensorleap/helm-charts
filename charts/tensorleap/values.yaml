ingress:
  enabled: true

ingress-nginx:
  enabled: true
  fullnameOverride: ingress-nginx
  controller:
    extraArgs:
      default-ssl-certificate: tensorleap/tls-secret
    image:
      digest: ""
    config:
      enable-snippets: "true"
      allow-snippet-annotations: "true"
    admissionWebhooks:
      patch:
        image:
          digest: ""
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"

global:
  target_namespace: ""
  storageClassName: ""
  create_local_volumes: true
  disable_auth: false
  domain: "localhost"
  basePath: ""
  url: "http://localhost"
  proxyUrl: ""
  tls:
    enabled: false
    cert: ""
    key: ""

  elasticsearch:
    enabled: true
    url: ""

  keycloakx:
    enabled: true

keycloakx:
  enabled: true
  replicas: 1
  cache:
    stack: custom # <— IMPORTANT

  command: ["/opt/keycloak/bin/kc.sh", "start"]

  # Disable the subchart's built-in KC_PROXY_HEADERS env var so our extraEnv
  # template (which sets it conditionally based on global.domain) is the sole
  # source.  Without this, the subchart emits KC_PROXY_HEADERS=forwarded first
  # and glibc's getenv() returns the first match, ignoring our override.
  proxy:
    enabled: false
    http:
      enabled: true

  fullnameOverride: keycloak
  ingress:
    enabled: false
  # make sure the container can write the volume (image runs as uid 1000)
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"

  extraEnv: |
    - name: KEYCLOAK_ADMIN
      value: "admin"
    - name: KEYCLOAK_ADMIN_PASSWORD
      value: "admin"
    - name: KC_DB
      value: "dev-file"
    - name: KC_CACHE
      value: "local"
    - name: KC_PROXY
      value: "edge"
    - name: KC_CACHE_STACK
      value: ""
    {{- if and .Values.global.domain (ne .Values.global.domain "localhost") }}
    - name: KC_HOSTNAME_STRICT
      value: "true"
    - name: KC_PROXY_HEADERS
      value: "xforwarded"
    {{- if .Values.global.proxyUrl }}
    - name: KC_HOSTNAME
      value: "{{ .Values.global.proxyUrl }}/auth"
    - name: KC_HOSTNAME_URL
      value: "{{ .Values.global.proxyUrl }}/auth"
    - name: KC_FRONTEND_URL
      value: "{{ .Values.global.proxyUrl }}/auth"
    {{- else if .Values.global.url }}
    - name: KC_HOSTNAME
      value: "{{ .Values.global.url }}/auth"
    - name: KC_HOSTNAME_URL
      value: "{{ .Values.global.url }}/auth"
    - name: KC_FRONTEND_URL
      value: "{{ .Values.global.url }}/auth"
    {{- end }}
    {{- else }}
    - name: KC_HOSTNAME_STRICT
      value: "false"
    - name: KC_PROXY_HEADERS
      value: "forwarded"
    {{- end }}
    - name: KC_HOSTNAME_STRICT_HTTPS
      value: "{{ .Values.global.tls.enabled }}"
    {{- if and .Values.global.tls.enabled .Values.global.url }}
    - name: KC_HOSTNAME_ADMIN_URL
      value: "{{ .Values.global.url }}/auth"
    {{- end }}

  extraVolumes: |
    - name: keycloak-data
      persistentVolumeClaim:
        claimName: keycloak-data

  extraVolumeMounts: |
    - name: keycloak-data
      mountPath: /opt/keycloak/data

  health:
    enabled: true

  startupProbe: |
    httpGet:
      path: '{{ tpl .Values.http.relativePath $ | trimSuffix "/" }}/health/started'
      port: '{{ .Values.http.internalPort }}'
      scheme: '{{ .Values.http.internalScheme }}'
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30

datadog:
  enabled: true
  clusterAgent:
    enabled: false
  datadog:
    processAgent:
      enabled: false
    tags:
      - "env:on-prem"
    logs:
      enabled: true
      containerCollectAll: false
    apiKeyExistingSecret: datadog-secret
    appKeyExistingSecret: datadog-secret
    site: datadoghq.com
